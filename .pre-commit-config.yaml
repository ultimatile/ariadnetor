default_install_hook_types: [pre-commit, pre-push]

repos:
  - repo: local
    hooks:
      - id: cargo-fmt
        name: cargo fmt
        description: Format Rust code with cargo fmt (workspace only)
        entry: cargo fmt
        language: system
        types: [rust]
        pass_filenames: false
      - id: cargo-clippy
        name: cargo clippy
        description: Lint Rust code via the shared `cargo make clippy` gate (denies warnings; covers all targets including tests)
        entry: cargo make clippy
        language: system
        types: [rust]
        pass_filenames: false
      - id: check-file-lines
        name: check file line count
        description: Reject files exceeding line limits (src 600, tests 800)
        entry: scripts/check-file-lines.sh
        language: script
        types: [rust]
      - id: audit-host-twin-delegation
        name: host-ext delegates to *_with_backend twin
        description: host_ops methods must delegate to their generic twin, not bake the host
        entry: scripts/audit-host-twin-delegation.py
        language: script
        types: [rust]
        pass_filenames: false
      - id: audit-no-order-literal-in-ctor
        name: no MemoryOrder literal in tensor constructors
        description: constructor order must come from host_order()/preferred_order()
        entry: scripts/audit-no-order-literal-in-ctor.py
        language: script
        types: [rust]
        pass_filenames: false
      - id: audit-no-native-backend-in-src
        name: no concrete NativeBackend in consumer source
        description: signatures and host paths must use the Host alias or OpsFor<…>
        entry: scripts/audit-no-native-backend-in-src.py
        language: script
        types: [rust]
        pass_filenames: false
      - id: audit-selftest
        name: audit-helper contract tests
        description: lock the source-audit helpers against robustness regressions
        entry: scripts/test_audit_helpers.py
        language: script
        types: [python]
        pass_filenames: false
      - id: protect-default-branch
        name: refuse pushes to default branch
        entry: scripts/protect-default-branch.sh
        language: script
        pass_filenames: false
        always_run: true
        stages: [pre-push]
