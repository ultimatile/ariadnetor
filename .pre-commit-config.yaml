repos:
  - repo: local
    hooks:
      - id: cargo-fmt
        name: cargo fmt
        description: Format Rust code with cargo fmt (workspace only)
        entry: cargo fmt
        language: system
        types: [rust]
        pass_filenames: false
      - id: cargo-check
        name: cargo check
        description: Check Rust code with cargo check
        entry: cargo check --workspace
        language: system
        types: [rust]
        pass_filenames: false
      - id: check-file-lines
        name: check file line count
        description: Reject files exceeding line limits (src 600, tests 800)
        entry: scripts/check-file-lines.sh
        language: script
        types: [rust]
