[package]
name = "ariadnetor-linalg"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Backend-agnostic linear algebra API for Ariadnetor"

[dependencies]
ariadnetor-core = { path = "../ariadnetor-core" }
ariadnetor-tensor = { path = "../ariadnetor-tensor" }
num-complex = { workspace = true }
num-traits = { workspace = true }

[dev-dependencies]
ariadnetor-native = { path = "../ariadnetor-native" }
approx = { workspace = true }
criterion = { workspace = true }
rand = { workspace = true }

[[bench]]
name = "scalar_ops"
harness = false

[lib]
name = "arnet_linalg"
path = "src/lib.rs"
