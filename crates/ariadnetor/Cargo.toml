[package]
name = "ariadnetor"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Pure Rust Distributed Tensor Network Framework"

[dependencies]
ariadnetor-core = { path = "../ariadnetor-core" }
ariadnetor-tensor = { path = "../ariadnetor-tensor" }
anyhow = { workspace = true }
faer = { workspace = true }
lru = { workspace = true }
hptt = { workspace = true, optional = true }

[features]
default = []
transpose = ["hptt"]

[dev-dependencies]
approx = { workspace = true }

[lib]
name = "arnet"
path = "src/lib.rs"
