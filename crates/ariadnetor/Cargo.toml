[package]
name = "ariadnetor"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "MLIR-based Distributed Tensor Network Framework"

[dependencies]
ariadnetor-tensor-compute-dialect = { path = "../ariadnetor-tensor-compute-dialect" }
anyhow = { workspace = true }
faer = { workspace = true }
lru = { workspace = true }
hptt = { workspace = true, optional = true }

[features]
default = []
mlir = ["ariadnetor-tensor-compute-dialect/mlir"]
transpose = ["hptt"]

[dev-dependencies]
approx = { workspace = true }
melior = { workspace = true }

[lib]
name = "arnet"
path = "src/lib.rs"
