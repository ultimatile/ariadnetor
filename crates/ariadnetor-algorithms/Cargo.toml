[package]
name = "ariadnetor-algorithms"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Tensor-network algorithms (DMRG, TEBD, ...) built on Ariadnetor"

[features]
default = []
arpack = ["dep:arpack", "dep:num-complex"]

[dependencies]
ariadnetor-core = { path = "../ariadnetor-core" }
ariadnetor-tensor = { path = "../ariadnetor-tensor" }
ariadnetor-linalg = { path = "../ariadnetor-linalg" }
ariadnetor-native = { path = "../ariadnetor-native" }
ariadnetor-mps = { path = "../ariadnetor-mps" }
num-traits = { workspace = true }
num-complex = { workspace = true, optional = true }
rand = { workspace = true }
arpack = { version = "0.0.1", optional = true }

[dev-dependencies]
approx = { workspace = true }
criterion = { workspace = true }
num-complex = { workspace = true }
rand = { workspace = true }

[lib]
name = "arnet_algorithms"
path = "src/lib.rs"

[[bench]]
name = "dmrg_local_eigensolver"
harness = false
