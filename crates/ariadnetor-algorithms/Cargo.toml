[package]
name = "ariadnetor-algorithms"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Tensor-network algorithms (DMRG, TEBD, ...) built on Ariadnetor"

[features]
default = []
arpack = ["dep:arpack", "dep:num-complex"]

[dependencies]
ariadnetor = { path = "../ariadnetor" }
ariadnetor-mps = { path = "../ariadnetor-mps" }
num-traits = { workspace = true }
num-complex = { workspace = true, optional = true }
rand = { workspace = true }
arpack = { version = "0.0.3", optional = true }
thiserror = { workspace = true }

[dev-dependencies]
approx = { workspace = true }
# Leaf-crate dev dep: tests reach the `reordered` escape hatch, which names
# the `MemoryOrder` layout type. That type is deliberately not re-exported
# from the `arnet` umbrella, so tests pull it from the tensor leaf directly.
ariadnetor-tensor = { path = "../ariadnetor-tensor" }
criterion = { workspace = true }
num-complex = { workspace = true }
rand = { workspace = true }
test-utils = { path = "../../test-utils" }

[lib]
name = "arnet_algorithms"
path = "src/lib.rs"

[[bench]]
name = "dmrg_local_eigensolver"
harness = false

[lints]
workspace = true
