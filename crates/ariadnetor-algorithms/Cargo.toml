[package]
name = "ariadnetor-algorithms"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Tensor-network algorithms (DMRG, TEBD, ...) built on Ariadnetor"
# The legacy-import guard stub `#[path]`-includes its single source from
# the sibling mps crate, which a packaged .crate cannot reach; keep the
# workspace-internal guard out of the package.
exclude = ["tests/legacy_import_guard.rs"]

[features]
default = []
arpack = ["dep:arpack", "dep:num-complex"]

[dependencies]
ariadnetor = { path = "../ariadnetor" }
ariadnetor-mps = { path = "../ariadnetor-mps" }
num-traits = { workspace = true }
num-complex = { workspace = true, optional = true }
rand = { workspace = true }
arpack = { version = "0.0.3", optional = true }
thiserror = { workspace = true }

[dev-dependencies]
approx = { workspace = true }
# The legacy-import guard (a #[path] include of the mps crate's single
# source) parses production sources syntactically; span-locations
# supplies the line numbers in its failure report. The features are
# restated here so the guard's contract survives a narrowing of the
# workspace defaults.
proc-macro2 = { workspace = true, features = ["span-locations"] }
syn = { workspace = true, features = ["full", "visit"] }
# Leaf-crate dev dep: tests reach the `reordered` escape hatch, which names
# the `MemoryOrder` layout type. That type is deliberately not re-exported
# from the `arnet` umbrella, so tests pull it from the tensor leaf directly.
ariadnetor-tensor = { path = "../ariadnetor-tensor" }
criterion = { workspace = true }
num-complex = { workspace = true }
rand = { workspace = true }
test-utils = { path = "../../test-utils" }

[lib]
name = "arnet_algorithms"
path = "src/lib.rs"

[[bench]]
name = "dmrg_local_eigensolver"
harness = false

[lints]
workspace = true
