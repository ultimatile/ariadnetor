[package]
name = "ariadnetor-algorithms"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Tensor-network algorithms (DMRG, TEBD, ...) built on Ariadnetor"

[features]
default = []
# Optional ARPACK-NG path for the Krylov eigensolver. Off by default;
# the in-house native Lanczos is the default backend.
arpack-ng = []

[dependencies]
ariadnetor-core = { path = "../ariadnetor-core" }
ariadnetor-tensor = { path = "../ariadnetor-tensor" }
ariadnetor-linalg = { path = "../ariadnetor-linalg" }
ariadnetor-native = { path = "../ariadnetor-native" }
num-traits = { workspace = true }
rand = { workspace = true }

[dev-dependencies]
approx = { workspace = true }
num-complex = { workspace = true }
rand = { workspace = true }

[lib]
name = "arnet_algorithms"
path = "src/lib.rs"
