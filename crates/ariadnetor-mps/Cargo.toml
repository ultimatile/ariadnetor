[package]
name = "ariadnetor-mps"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Matrix Product State / Operator (MPS / MPO) data structures and operations for Ariadnetor"

[dependencies]
ariadnetor = { path = "../ariadnetor" }
num-traits = { workspace = true }

[dev-dependencies]
approx = { workspace = true }
# Leaf-crate dev dep: tests reach the `reordered` escape hatch, which names
# the `MemoryOrder` layout type. That type is deliberately not re-exported
# from the `arnet` umbrella, so tests pull it from the tensor leaf directly.
ariadnetor-tensor = { path = "../ariadnetor-tensor" }
# Leaf-crate dev dep: the authority-routing tests implement a delegating
# ComputeBackend whose kernel methods name the descriptor types. Those
# types are deliberately not re-exported from the `arnet` umbrella.
ariadnetor-core = { path = "../ariadnetor-core" }
# The legacy-import guard parses production sources syntactically;
# span-locations supplies the line numbers in its failure report. The
# features are restated here so the guard's contract survives a
# narrowing of the workspace defaults.
proc-macro2 = { workspace = true, features = ["span-locations"] }
syn = { workspace = true, features = ["full", "visit"] }

[lib]
name = "arnet_mps"
path = "src/lib.rs"

[lints]
workspace = true
