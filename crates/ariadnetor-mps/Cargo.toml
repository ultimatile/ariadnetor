[package]
name = "ariadnetor-mps"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Matrix Product State / Operator (MPS / MPO) data structures and operations for Ariadnetor"

[dependencies]
ariadnetor = { path = "../ariadnetor" }
num-traits = { workspace = true }

[dev-dependencies]
approx = { workspace = true }
# Leaf-crate dev dep: tests reach the `reordered` escape hatch, which names
# the `MemoryOrder` layout type. That type is deliberately not re-exported
# from the `arnet` umbrella, so tests pull it from the tensor leaf directly.
ariadnetor-tensor = { path = "../ariadnetor-tensor" }

[lib]
name = "arnet_mps"
path = "src/lib.rs"

[lints]
workspace = true
