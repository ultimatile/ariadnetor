# Layer-leak allow-list for ariadnetor-tensor's public API
# (cargo-check-external-types; see CONTRIBUTING.md "Ad-hoc QA tools").
#
# EXACT paths, no globs. `arnet_native::NativeBackend` is the ONE intended
# native exposure — the `Host` alias (`pub type Host = NativeBackend`),
# flagged at its definition site. Any OTHER arnet_native type appearing here
# is a layer leak to fix, not to whitelist.
allowed_external_types = [
    "arnet_core::backend::ComputeBackend",
    "arnet_core::backend::MemoryOrder",
    "arnet_core::contraction_error::ContractionError",
    "arnet_core::einsum::compute_permutation",
    "arnet_core::einsum::ContractionPlan",
    "arnet_core::einsum::EinsumExpr",
    "arnet_core::scalar::Scalar",
    "arnet_native::NativeBackend",
    "num_complex::Complex",
    "num_traits::identities::One",
    "num_traits::identities::Zero",
    "rand_core::Rng",
    "rand::distr::distribution::Distribution",
]
