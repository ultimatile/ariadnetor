# Reduce timeout from default 5x to 2x baseline.
# Most timeouts are FFI glue mutations (gemm/qr/lq/svd/solve/transpose)
# that cause LAPACK to hang on garbage input — 2x is enough to detect them.
timeout_multiplier = 2.0

exclude_re = [
    # Equivalent mutants: real types return 0.0 for im(), same as Default::default()
    "Scalar for f(32|64)>::im .* Default::default",
    # NativeBackend has no state, so Arc::new(Default::default()) == shared()
    "NativeBackend::shared .* Arc::new",

    # --- Line-number-based patterns (fragile: update line numbers when source changes) ---
    # truncate_bsp final right sweep accumulator: by the time `for j in 0..center`
    # runs, the prior left sweep has already truncated every bond to chi_max,
    # so trunc_svd_block_sparse returns err = 0 at every step here. With
    # step = 0, `total + 0 ≡ total - 0`, so this mutation is structurally a no-op.
    # The `+ → *` mutation on the same line is NOT equivalent (multiplying by 0
    # zeros the accumulator) and remains in scope.
    "truncate.rs:354:37: replace \\+ with - in truncate_bsp",

    # --- Function-name-based patterns (stable across line changes) ---
    # norm_1: tie-breaking order doesn't affect max value
    "replace > with >= in norm_1",
    # einsum: 0-input arm is unreachable (parse always produces >= 1 input)
    "delete match arm 0 in einsum$",
    # einsum: Hadamard is an optimization of batched_contract; both produce same result
    "replace == with != in einsum_pair",
    # compute_scaling_decision boundary equivalences:
    # - `norm > theta` boundary: at norm == theta, s=0 either way.
    # - `norm / theta` ratio: any non-divisor op produces a different s, but the final
    #   exp(A) = (exp(B))^(2^s) reconstructs identically because each squaring inverts
    #   one halving (within Pade tolerance).
    # - `s <= 62` boundary: at s=62 both the bit-shift and the doubling-loop branches
    #   compute 2^62. The doubling loop's `v + v` mutations are NOT equivalent and are
    #   killed by `compute_scaling_decision_above_shift_threshold`.
    "replace > with >= in compute_scaling_decision",
    "replace / with \\* in compute_scaling_decision",
    "replace <= with > in compute_scaling_decision",
    # restore_center_sweep_dense: prior right and left sweeps already truncate every bond
    # to chi_max (and to target_trunc_err if set), so each step's err is structurally 0
    # in exact arithmetic. Subtracting 0 is a no-op, hence + with - is equivalent. The peer
    # + with * mutation is NOT equivalent (would zero the prior accumulator) and remains.
    "replace \\+ with - in restore_center_sweep_dense",
    # sweep_2site L→R trailing-advance skip is a perf optimization, not a
    # correctness gate: the mutated extra advance_left(n-2) sets
    # left[n-1] = Some(stale) and right[n-1] = None. The next R→L step
    # at site = n-2 reads left(n-2) and right(n) (both still valid),
    # then runs advance_right(n-1) which (j > 0 clause in env.rs) sets
    # left[n-1] = None and right[n-1] = Some. Subsequent R→L steps at
    # site < n-2 read left[site], never left[n-1], so the stale value
    # is never observed. End-of-sweep state matches the original
    # exactly. Confirmed via cargo-mutants run on these two mutants
    # alone — both MISSED across the full test suite by design.
    "sweep.rs:351:21: replace < with <= in sweep_2site",
    "sweep.rs:351:31: replace - with \\+ in sweep_2site",
    # sweep_2site per-step diagnostics aggregation: tracking-min
    # (`<` / `<=`) and tracking-max (`>` / `>=`) yield identical
    # values for any finite input — distinct values pick the extremum
    # once, tied values overwrite with the same value. NaN comparisons
    # are false either way, so neither variant updates on a NaN step
    # (NaN-sticky semantics are preserved). Not refactored to
    # `Float::min` / `Float::max` because those mask NaN by returning
    # the non-NaN argument, which would change the diagnostic on
    # numerically broken runs.
    "sweep.rs:415:29: replace < with <= in sweep_2site",
    "sweep.rs:418:28: replace > with >= in sweep_2site",
    # contract_to_tensor trans-flag predicates: any mutation that forces the predicate
    # to false (or removes the leading `!`) routes through the physical-permute GEMM
    # path, which produces identical numerical results to the trans-flag GEMM path
    # by design. The `with true` / `&& with ||` mutations are NOT equivalent (they
    # would force trans-flag GEMM with non-suitable permutations) and remain in scope.
    # The peer `delete !` mutations on `!lhs_trans_flag` / `!rhs_trans_flag` operands
    # in `lhs_needs_physical_t` / `rhs_needs_physical_t` are also NOT equivalent.
    "delete ! in compute_lhs_trans_flag",
    "delete ! in compute_rhs_trans_flag",
    "replace compute_lhs_trans_flag -> bool with false",
    "replace compute_rhs_trans_flag -> bool with false",
    # nrow=0 validation: downstream non-square check catches it
    "replace .* with && in eigh$",
    "replace .* with && in eig$",
    "replace .* with && in solve$",
    "replace .* with && in inverse$",
    # transpose_block_data: rank<=1 early return is optimization; transpose of rank-1 is identity
    "replace .* with && in transpose_block_data",
    # Error::source: error chain metadata, no functional impact
    "LinalgError>::source",
    # ComputeBackend default impls: NativeBackend overrides all; no other backend exists
    "ComputeBackend>::is_available",
    "ComputeBackend>::svd .* Ok",
    "ComputeBackend>::qr .* Ok",
    "ComputeBackend>::lq .* Ok",
    "ComputeBackend>::eigh .* Ok",
    "ComputeBackend>::eig .* Ok",
    "ComputeBackend>::solve .* Ok",
    # Display::fmt for error types: error message content, no functional impact
    "BackendError>::fmt .* Ok",
    "ContractionError>::fmt .* Ok",
    # norm Mixed arm: optimization shortcut; fallback computes same result via full inner product
    "inner.rs.*delete match arm.*Mixed.*in norm",
    # lanczos_smallest: equivalent mutants under full reorthogonalization.
    # `basis[j - 1]` → `basis[j / 1]` = `basis[j]` (= v_j). The recurrence's
    # altered subtraction lives entirely in span(basis); two passes of classical
    # Gram-Schmidt reorthogonalization re-project w onto span(basis)^perp to
    # working precision, so β, alpha, tridiagonal entries, and basis are
    # indistinguishable. Tests at tol >> eps cannot distinguish. Function-name
    # anchored: same `replace - with / in lanczos_smallest` name also matches
    # `betas[j - 1] → betas[j]` and `data[m - 1] → data[m]`, both of which
    # access OOB at iter j > 0 (or m == 1) and panic — caught structurally,
    # so the over-match is benign.
    "replace - with / in lanczos_smallest",
    # `j + 1 == max_iter` → `j * 1 == max_iter`. The `for j in 0..max_iter`
    # loop terminates at j = max_iter - 1 in both versions; the mutation only
    # inserts an extra basis.push / betas.push before the natural loop exit.
    # Neither is surfaced in LanczosResult, and Ritz reconstruction uses
    # `take(m)` with m ≤ max_iter so the extra entry is never read. The peer
    # mutation `:210:18 == → !=` is NOT equivalent (would break at every
    # j ≠ max_iter - 1, including j = 0) and is caught.
    #
    # Anchored line:col deliberately. The same-named mutant also exists at
    # `:150:19` (`iters = j + 1 → j * 1`), which is killed by the
    # `lanczos_n1_returns_iters_one` test added in the same change. Relaxing
    # this regex to function-name would silently un-track that test's
    # regression detection. Re-anchor on reformat using the rationale above.
    "lanczos.rs:210:14: replace \\+ with \\* in lanczos_smallest",
]
