# This is the SHIPPED mutation pass: it runs with default features, i.e.
# hptt ON (ariadnetor-native) and arpack OFF (ariadnetor-algorithms). Two
# code regions are therefore out of THIS run's scope by construction, not
# because they are spec gaps:
#   - the ARPACK backend (krylov/arpack.rs, #[cfg(feature = "arpack")]) is
#     never compiled here, so its mutants trivially pass;
#   - the naive transpose fallback (transpose.rs,
#     #[cfg(not(feature = "hptt"))]) is masked by hptt, so its mutants are
#     unviable.
# Both are covered by dedicated feature-flipped passes — `cargo make
# mutants-arpack` and `cargo make mutants-naive` (see Makefile.toml and
# CONTRIBUTING.md). Read this run's missed.txt knowing those regions are
# audited there, not here.

# Reduce timeout from default 5x to 2x baseline.
# Most timeouts are FFI glue mutations (gemm/qr/lq/svd/solve/transpose)
# that cause LAPACK to hang on garbage input — 2x is enough to detect them.
timeout_multiplier = 2.0

# Run the whole workspace's test suite against every mutant, not just the
# owning package's tests. Cross-crate coverage is the norm here: e.g.
# ariadnetor-core's `ComputeBackend::is_available` and `dispatch_op` are only
# exercised by ariadnetor-native's integration tests. Package-scoped testing
# (the default) reports those as MISSED purely because the exercising test
# never runs, not because of a real spec gap.
test_workspace = true

# The shared test fixtures are test infrastructure, not production code:
# DMRG / MPS chains in the algorithms-fixtures crate, plus the QNIndex leg
# builders and densify / template helpers in ariadnetor-tensor's feature-gated
# test_fixtures module. Mutating them only asks whether the fixtures
# themselves are asserted, which is not the property mutation testing is for
# here. Excluding both removes that noise.
exclude_globs = [
    "algorithms-fixtures/**/*.rs",
    "crates/ariadnetor-tensor/src/test_fixtures/**/*.rs",
]

exclude_re = [
    # Equivalent mutants: real types return 0.0 for im(), same as Default::default()
    "Scalar for f(32|64)>::im .* Default::default",
    # NativeBackend has no state, so Arc::new(Default::default()) == shared()
    "NativeBackend::shared .* Arc::new",

    # --- Line-number-based patterns (fragile: update line numbers when source changes) ---
    # truncate_bsp final right sweep accumulator: by the time `for j in 0..center`
    # runs, the prior left sweep has already truncated every bond to chi_max,
    # so trunc_svd_block_sparse returns err = 0 at every step here. With
    # step = 0, `total + 0 ≡ total - 0`, so this mutation is structurally a no-op.
    # The `+ → *` mutation on the same line is NOT equivalent (multiplying by 0
    # zeros the accumulator) and remains in scope.
    "truncate.rs:255:37: replace \\+ with - in truncate_bsp",
    # truncate_dense final right sweep accumulator (the former
    # restore_center_sweep_dense helper, now inlined): same structurally-zero
    # error argument as the truncate_bsp pattern above. Line:col anchored
    # because the first two sweeps' accumulators in the same function are
    # killable and must stay in scope.
    "truncate.rs:73:37: replace \\+ with - in truncate_dense",

    # --- Function-name-based patterns (stable across line changes) ---
    # norm_1: tie-breaking order doesn't affect max value
    "replace > with >= in norm_1",
    # einsum_dense: 0-input arm is unreachable (parse always produces >= 1 input)
    "delete match arm 0 in einsum_dense$",
    # einsum: Hadamard is an optimization of batched_contract; both produce same result
    "replace == with != in einsum_pair",
    # compute_scaling_decision boundary equivalences:
    # - `norm > theta` boundary: at norm == theta, s=0 either way.
    # - `norm / theta` ratio: any non-divisor op produces a different s, but the final
    #   exp(A) = (exp(B))^(2^s) reconstructs identically because each squaring inverts
    #   one halving (within Pade tolerance).
    # - `s <= 62` boundary: at s=62 both the bit-shift and the doubling-loop branches
    #   compute 2^62. The doubling loop's `v + v` mutations are NOT equivalent and are
    #   killed by `compute_scaling_decision_above_shift_threshold`.
    "replace > with >= in compute_scaling_decision",
    "replace / with \\* in compute_scaling_decision",
    "replace <= with > in compute_scaling_decision",
    # sweep_2site L→R trailing-advance skip is a perf optimization, not a
    # correctness gate: the mutated extra advance_left(n-2) sets
    # left[n-1] = Some(stale) and right[n-1] = None. The next R→L step
    # at site = n-2 reads left(n-2) and right(n) (both still valid),
    # then runs advance_right(n-1) which (j > 0 clause in env.rs) sets
    # left[n-1] = None and right[n-1] = Some. Subsequent R→L steps at
    # site < n-2 read left[site], never left[n-1], so the stale value
    # is never observed. End-of-sweep state matches the original
    # exactly. Confirmed via cargo-mutants run on these two mutants
    # alone — both MISSED across the full test suite by design.
    "sweep.rs:362:21: replace < with <= in sweep_2site",
    "sweep.rs:362:31: replace - with \\+ in sweep_2site",
    # sweep_2site per-step diagnostics aggregation: tracking-min
    # (`<` / `<=`) and tracking-max (`>` / `>=`) yield identical
    # values for any finite input — distinct values pick the extremum
    # once, tied values overwrite with the same value. NaN comparisons
    # are false either way, so neither variant updates on a NaN step
    # (NaN-sticky semantics are preserved). Not refactored to
    # `Float::min` / `Float::max` because those mask NaN by returning
    # the non-NaN argument, which would change the diagnostic on
    # numerically broken runs.
    "sweep.rs:426:29: replace < with <= in sweep_2site",
    "sweep.rs:429:28: replace > with >= in sweep_2site",
    # contract_to_tensor trans-flag predicates: any mutation that forces the predicate
    # to false (or removes the leading `!`) routes through the physical-permute GEMM
    # path, which produces identical numerical results to the trans-flag GEMM path
    # by design. The `with true` / `&& with ||` mutations are NOT equivalent (they
    # would force trans-flag GEMM with non-suitable permutations) and remain in scope.
    # The peer `delete !` mutations on `!lhs_trans_flag` / `!rhs_trans_flag` operands
    # in `lhs_needs_physical_t` / `rhs_needs_physical_t` are also NOT equivalent.
    "delete ! in compute_lhs_trans_flag",
    "delete ! in compute_rhs_trans_flag",
    "replace compute_lhs_trans_flag -> bool with false",
    "replace compute_rhs_trans_flag -> bool with false",
    # NOTE: the linalg high-level validation/policy mutants are deliberately
    # NOT excluded — they are coverage gaps, not equivalents (tracked by #156):
    #   - `|| → &&` / `>= → <` on the `nrow == 0 || nrow >= rank` guard in
    #     *_with_policy_dense / inverse_dense and the *_dense wrappers: disabling
    #     the guard lets execution reach `shape[..nrow]` for `nrow > rank`, which
    #     panics instead of returning InvalidArgument. Existing
    #     `test_*_invalid_nrow` tests only cover `nrow == 0` / `nrow == rank`; a
    #     `nrow > rank` case kills these.
    #   - policy-key `== → !=` in the auto-policy *_dense wrappers: numerically
    #     equivalent (only changes the `n` fed to `backend.par_for_*(n)`), but
    #     per the cargo-mutants skill an optimization-gate predicate is killed by
    #     a direct unit test on the policy selection, not suppressed. Left in
    #     scope so that test can be written.
    # NOTE: contract_dense's `== → !=` is deliberately NOT excluded. The two
    # operands of the fast-path key (`lhs.rank() == lhs_indices.len()` at 27 and
    # `rhs.rank() == rhs_indices.len()` at 28) are asymmetric in the run: 27 is
    # CAUGHT, only 28 is MISSED. A true "mismatch routes through the equivalent
    # general path" property would make both equivalent; the asymmetry shows 28
    # is a test gap (the rhs-rank path lacks a distinguishing test), not an
    # equivalent mutant. A function-name anchor would also wrongly suppress the
    # killable 27. Left in scope; tracked as a coverage gap, not suppressed.
    # transpose_block_data: rank<=1 early return is optimization; transpose of rank-1 is identity
    "replace .* with && in transpose_block_data",
    # Error::source: error chain metadata, no functional impact
    "LinalgError>::source",
    # NOTE: ComputeBackend default trait-method bodies (svd/qr/lq/eigh/eig/solve,
    # which return Err(NotSupported)) are deliberately NOT excluded. They are
    # currently overridden by every concrete impl, but the type system does not
    # guarantee that — the defaults exist precisely so a partial backend may omit
    # a method, and for such a backend `Err(NotSupported) → Ok(())` changes the
    # documented fallback contract. That makes them a coverage gap (no test
    # exercises a partial backend), not type-guaranteed-unreachable equivalents,
    # so they stay in scope. (The previous `ComputeBackend>::` patterns were also
    # dead config: the trait-default name format is `ComputeBackend::<m>`, not
    # `<X as ComputeBackend>::<m>`.)
    # Display::fmt for error types: error message content, no functional impact
    "BackendError>::fmt .* Ok",
    "ContractionError>::fmt .* Ok",
    # norm Mixed arm: optimization shortcut; fallback computes same result via full inner product
    "inner.rs.*delete match arm.*Mixed.*in norm",
    # lanczos_smallest: equivalent mutants under full reorthogonalization.
    # `basis[j - 1]` → `basis[j / 1]` = `basis[j]` (= v_j). The recurrence's
    # altered subtraction lives entirely in span(basis); two passes of classical
    # Gram-Schmidt reorthogonalization re-project w onto span(basis)^perp to
    # working precision, so β, alpha, tridiagonal entries, and basis are
    # indistinguishable. Tests at tol >> eps cannot distinguish. Function-name
    # anchored: same `replace - with / in lanczos_smallest` name also matches
    # `betas[j - 1] → betas[j]` and `data[m - 1] → data[m]`, both of which
    # access OOB at iter j > 0 (or m == 1) and panic — caught structurally,
    # so the over-match is benign.
    "replace - with / in lanczos_smallest",
    # `j + 1 == max_iter` → `j * 1 == max_iter`. The `for j in 0..max_iter`
    # loop terminates at j = max_iter - 1 in both versions; the mutation only
    # inserts an extra basis.push / betas.push before the natural loop exit.
    # Neither is surfaced in LanczosResult, and Ritz reconstruction uses
    # `take(m)` with m ≤ max_iter so the extra entry is never read. The peer
    # mutation `== → !=` at the same statement is NOT equivalent (would break at
    # every j ≠ max_iter - 1, including j = 0) and is caught.
    #
    # Anchored line:col deliberately. The same-named `+ → *` mutant also exists
    # at the `iters = j + 1` statement, which is killed by the
    # `lanczos_n1_returns_iters_one` test. Relaxing this regex to function-name
    # would silently un-track that test's regression detection. Re-anchor on
    # reformat using the rationale above (line drifted 210 → 222 at 2d9ef96).
    "lanczos.rs:222:14: replace \\+ with \\* in lanczos_smallest",
    # NOTE: lanczos order-equality guards (`w_raw.order() == v_j.order()` and
    # `h_psi_raw.order() == psi.order()`) are deliberately NOT excluded. The
    # `== → !=` mutant is equivalent only while every operator returns the same
    # order as the basis. `LinearOp::apply` is permitted to return a different
    # order; for such an operator the mutant skips the reorder and feeds a
    # mismatched-order tensor to `linear_combine`, which panics. That is a
    # supported-but-uncovered path (a test with an order-flipping operator kills
    # it), i.e. a coverage gap, not an equivalent mutant. Left in scope.
    #
    # NOTE: fused_sector build_square_tensor's RowMajor arm (386-388) is also
    # NOT excluded. It is unreachable only because no `cargo test` routes a
    # RowMajor-preferred backend through a block-sparse solve/expm/inverse —
    # but RowMajor is a supported `ComputeBackend::preferred_order()` and an
    # in-tree `RowMajorBackend` fixture (linalg test_util.rs) already exists.
    # Wiring it through these ops kills the mutants, so this is a coverage gap,
    # not equivalence. Left in scope. (The ColumnMajor arm 393-395 is caught.)
]
