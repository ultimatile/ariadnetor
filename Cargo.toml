[workspace]
members = [
  "crates/ariadnetor-core",
  "crates/ariadnetor-tensor",
  "crates/ariadnetor",
]
resolver = "2"

[workspace.package]
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"

[workspace.dependencies]
# Linear algebra
faer = "0.23"
hptt = { path = "../hptt-rs" }

# Memory alignment
aligned-vec = "0.6"

# Utilities
anyhow = "1.0"
lru = "0.16"

# Numeric types
num-complex = "0.4"
num-traits = "0.2"

# Dev dependencies
approx = "0.5"
