[workspace]
members = ["crates/ariadnetor-tensor-dialect", "crates/ariadnetor"]
resolver = "2"

[workspace.package]
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"

[workspace.dependencies]
# MLIR
melior = "0.25"
mlir-sys = "0.5"

# Linear algebra
faer = "0.19"
hptt = { path = "../hptt-rs" }

# Utilities
anyhow = "1.0"
lru = "0.12"

# Build
cmake = "0.1"

# Dev dependencies
approx = "0.5"
