# cargo-make configuration for Ariadnetor
# Usage: cargo make <task>
# Install: cargo install cargo-make

[config]
default_to_workspace = false

# ============================================================================
# Build tasks
# ============================================================================

[tasks.build]
description = "Build entire workspace"
command = "cargo"
args = ["build", "--workspace"]

[tasks.build-release]
description = "Build entire workspace in release mode"
command = "cargo"
args = ["build", "--workspace", "--release"]

# ============================================================================
# Test tasks
# ============================================================================

[tasks.test]
description = "Run all tests (unit + integration)"
command = "cargo"
args = ["test", "--workspace"]

[tasks.test-lib]
description = "Run unit tests only (lib, no integration)"
command = "cargo"
args = ["test", "--workspace", "--lib"]

[tasks.test-einsum]
description = "Run einsum-specific tests"
command = "cargo"
args = ["test", "--test", "einsum_tests"]

# ============================================================================
# Utility tasks
# ============================================================================

[tasks.clean]
description = "Clean build artifacts"
command = "cargo"
args = ["clean"]

[tasks.check]
description = "Check code without building"
command = "cargo"
args = ["check", "--workspace"]

[tasks.clippy]
description = "Run clippy linter"
command = "cargo"
args = ["clippy", "--workspace", "--all-targets"]

[tasks.fmt]
description = "Format code with rustfmt"
command = "cargo"
args = ["fmt", "--all"]

[tasks.fmt-check]
description = "Check code formatting"
command = "cargo"
args = ["fmt", "--all", "--check"]

# ============================================================================
# Documentation tasks
# ============================================================================

[tasks.doc]
description = "Generate documentation"
command = "cargo"
args = ["doc", "--workspace", "--no-deps", "--open"]

# ============================================================================
# Benchmark tasks
# ============================================================================

[tasks.bench]
description = "Run the Criterion benchmarks"
dependencies = ["bench-tensor", "bench-linalg"]

[tasks.bench-tensor]
description = "Run Dense benchmarks"
command = "cargo"
args = ["bench", "-p", "ariadnetor-tensor"]

# Only the criterion regression benches; the `sweep_*` threshold instruments are
# on-demand (`cargo bench --bench sweep_*`) and excluded here so the regression
# run does not fire their expensive matrix-size sweeps.
[tasks.bench-linalg]
description = "Run the linalg Criterion benchmarks"
command = "cargo"
args = ["bench", "-p", "ariadnetor-linalg", "--bench", "scalar_ops", "--bench", "block_sparse_ops"]

# ============================================================================
# Composite tasks
# ============================================================================

[tasks.ci]
description = "Run CI checks (fmt, clippy, test)"
dependencies = ["fmt-check", "clippy", "test"]

[tasks.dev]
description = "Quick development check (fmt, check, test)"
dependencies = ["fmt", "check", "test"]
